name: CI/CD

on:
  push:
    branches:
      - main

jobs:
  backend:
    name: Backend Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"
          extensions: bcmath, mbstring, pdo_sqlite, sqlite3
          coverage: none

      - name: Determine Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('backend/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-composer-

      - name: Prepare Laravel environment
        run: cp .env.example .env

      - name: Install Composer dependencies
        run: composer install --no-interaction --no-progress --prefer-dist

      - name: Generate application key
        run: php artisan key:generate --force

      - name: Run Laravel tests
        run: php artisan test

  mobile:
    name: Mobile Checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable

      - name: Cache Flutter pub packages
        uses: actions/cache@v4
        with:
          path: ~/.pub-cache
          key: ${{ runner.os }}-pub-${{ hashFiles('mobile/pubspec.lock') }}
          restore-keys: |
            ${{ runner.os }}-pub-

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build release APK
        env:
          MOBILE_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL }}
        run: |
          API_BASE_URL="${MOBILE_API_BASE_URL:-http://localhost/api}"
          flutter build apk --release --dart-define=API_BASE_URL="$API_BASE_URL"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: mobile-app-release
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error

  docker:
    name: Publish Backend Image
    runs-on: ubuntu-latest
    needs:
      - backend
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Prepare image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/backend
          tags: |
            type=raw,value=latest
            type=sha

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./docker/backend/Dockerfile
          target: production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    name: Deploy To Server
    runs-on: ubuntu-latest
    needs:
      - backend
      - mobile
      - docker
    steps:
      - name: Check deploy secrets
        id: deploy-check
        shell: bash
        env:
          SERVER_HOST: ${{ secrets.SERVER_HOST }}
          SERVER_USER: ${{ secrets.SERVER_USER }}
          SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          if [[ -n "$SERVER_HOST" && -n "$SERVER_USER" && -n "$SERVER_SSH_KEY" ]]; then
            echo "ready=true" >> "$GITHUB_OUTPUT"
          else
            echo "ready=false" >> "$GITHUB_OUTPUT"
            echo "Deploy skipped because SERVER_HOST, SERVER_USER, or SERVER_SSH_KEY is missing."
          fi

      - name: Deploy over SSH
        if: ${{ steps.deploy-check.outputs.ready == 'true' }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          BACKEND_IMAGE: ghcr.io/${{ github.repository_owner }}/backend:latest
          SERVER_PATH: ${{ secrets.SERVER_PATH }}
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script_stop: true
          envs: BACKEND_IMAGE,SERVER_PATH
          script: |
            set -e
            DEPLOY_PATH="${SERVER_PATH:-$HOME/sarona-project}"
            cd "$DEPLOY_PATH"
            git pull origin main
            export BACKEND_IMAGE="$BACKEND_IMAGE"
            docker pull "$BACKEND_IMAGE"
            docker compose down
            docker compose up -d
            docker compose exec -T laravel php artisan migrate --force



