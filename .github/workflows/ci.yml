name: Mobile CI

on:
  push:
    branches:
      - main

jobs:
  mobile:
    name: Build Android APK
    runs-on: [self-hosted, Windows, X64]
    defaults:
      run:
        shell: powershell
        working-directory: mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify Flutter installation
        run: flutter --version

      - name: Verify Java installation
        run: java -version

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Analyze Flutter project
        run: flutter analyze

      - name: Run Flutter tests
        run: flutter test

      - name: Build release APK
        env:
          MOBILE_API_BASE_URL: ${{ vars.MOBILE_API_BASE_URL }}
        run: |
          $apiBaseUrl = if ($env:MOBILE_API_BASE_URL) { $env:MOBILE_API_BASE_URL } else { 'http://localhost/api' }
          flutter build apk --release --dart-define=API_BASE_URL=$apiBaseUrl

      - name: Show APK location
        run: |
          Write-Host 'APK created at:'
          Write-Host "$PWD\\build\\app\\outputs\\flutter-apk\\app-release.apk"
