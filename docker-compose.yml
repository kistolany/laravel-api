x-laravel-environment: &laravel-environment
  APP_NAME: ${APP_NAME:-Sarona API}
  APP_ENV: ${APP_ENV:-production}
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_URL: ${APP_URL:-http://localhost}
  LOG_CHANNEL: ${LOG_CHANNEL:-stack}
  LOG_LEVEL: ${LOG_LEVEL:-info}
  DB_CONNECTION: ${DB_CONNECTION:-mysql}
  DB_HOST: ${DB_HOST:-mysql}
  DB_PORT: ${DB_PORT:-3306}
  DB_DATABASE: ${DB_DATABASE:-sarona}
  DB_USERNAME: ${DB_USERNAME:-sarona}
  DB_PASSWORD: ${DB_PASSWORD:-sarona_secret}
  CACHE_STORE: ${CACHE_STORE:-file}
  SESSION_DRIVER: ${SESSION_DRIVER:-file}
  FILESYSTEM_DISK: ${FILESYSTEM_DISK:-local}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_PORT: ${REDIS_PORT:-6379}
  MAIL_MAILER: ${MAIL_MAILER:-log}
  MAIL_HOST: ${MAIL_HOST:-mailpit}
  MAIL_PORT: ${MAIL_PORT:-1025}
  MAIL_USERNAME: ${MAIL_USERNAME:-}
  MAIL_PASSWORD: ${MAIL_PASSWORD:-}
  MAIL_ENCRYPTION: ${MAIL_ENCRYPTION:-}
  MAIL_FROM_ADDRESS: ${MAIL_FROM_ADDRESS:-hello@example.com}
  MAIL_FROM_NAME: ${MAIL_FROM_NAME:-Sarona API}
  JWT_SECRET: ${JWT_SECRET:-change-this-jwt-secret}
  JWT_ISSUER: ${JWT_ISSUER:-http://localhost}
  JWT_ALGO: ${JWT_ALGO:-HS256}
  JWT_ACCESS_TTL: ${JWT_ACCESS_TTL:-900}
  JWT_REFRESH_TTL: ${JWT_REFRESH_TTL:-604800}
  JWT_SINGLE_REFRESH_TOKEN: ${JWT_SINGLE_REFRESH_TOKEN:-true}
  JWT_LEEWAY: ${JWT_LEEWAY:-0}
  TEACHER_OTP_TTL: ${TEACHER_OTP_TTL:-600}

services:
  laravel:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    image: ${BACKEND_IMAGE:-sarona/backend:local}
    restart: unless-stopped
    environment: *laravel-environment
    depends_on:
      mysql:
        condition: service_healthy
    volumes:
      - backend_public:/var/www/html/public
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache

  queue:
    build:
      context: .
      dockerfile: docker/backend/Dockerfile
      target: production
    image: ${BACKEND_IMAGE:-sarona/backend:local}
    restart: unless-stopped
    command: ["php", "artisan", "queue:work", "--verbose", "--tries=3", "--timeout=90"]
    environment: *laravel-environment
    depends_on:
      mysql:
        condition: service_healthy
      laravel:
        condition: service_started
    volumes:
      - backend_storage:/var/www/html/storage
      - backend_cache:/var/www/html/bootstrap/cache

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      laravel:
        condition: service_started
    ports:
      - "80:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - backend_public:/var/www/html/public:ro
      - backend_storage:/var/www/html/storage:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O - http://127.0.0.1/api/health >/dev/null 2>&1 || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s

  mysql:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sarona}
      MYSQL_USER: ${DB_USERNAME:-sarona}
      MYSQL_PASSWORD: ${DB_PASSWORD:-sarona_secret}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  backend_cache:
  backend_public:
  backend_storage:
  mysql_data:
