services:
  # Laravel PHP-FPM Service
  api:
    build: .
    container_name: laravel_api
    restart: unless-stopped
    command: sh -c "mkdir -p storage/framework/cache/data storage/framework/sessions storage/framework/views bootstrap/cache; chown -R www-data:www-data storage bootstrap/cache; php-fpm -F"
    volumes:
      - .:/var/www
      - laravel_framework_cache:/var/www/storage/framework/cache
      - laravel_framework_sessions:/var/www/storage/framework/sessions
      - laravel_framework_views:/var/www/storage/framework/views
      - laravel_bootstrap_cache:/var/www/bootstrap/cache
    depends_on:
      - db

  # Nginx Gateway Service
  nginx:
    image: nginx:1.27-alpine
    container_name: laravel_nginx
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api

  # MySQL Database Service
  db:
    image: mysql:8.0
    container_name: mysql_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: studentms
      MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data:
  laravel_framework_cache:
  laravel_framework_sessions:
  laravel_framework_views:
  laravel_bootstrap_cache: